<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0d1117" />
    <title>不可移动文物数字档案平台</title>
    <style>
      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #0d1117;
        color: #e6edf3;
        font-family: "Microsoft YaHei", "PingFang SC", -apple-system, BlinkMacSystemFont, sans-serif;
        overflow: hidden;
      }
      .boot-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0d1117;
        color: #8b949e;
        font-size: 14px;
        z-index: 9999;
      }
      .boot-loader .ring {
        width: 36px;
        height: 36px;
        border: 3px solid rgba(88, 166, 255, 0.2);
        border-top-color: #58a6ff;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
        margin-right: 12px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot-loader">
        <div class="ring"></div>
        <div>正在加载文物数字档案平台...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
